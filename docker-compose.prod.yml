# Production Docker Compose for Docker Swarm
# Deploy with: docker stack deploy -c docker-compose.prod.yml scoutlgs
# TODO: Make the github username variable work
services:
  # PostgreSQL - Store configuration and metadata
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=scoutlgs
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    volumes:
      - scoutlgs-postgres-data:/var/lib/postgresql/data
    networks:
      - postgres-network
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 1G

  # PostgreSQL - Identity/auth database
  auth-postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=scoutlgs_auth
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/auth_database_password
    volumes:
      - scoutlgs-auth-postgres-data:/var/lib/postgresql/data
    networks:
      - auth-postgres-network
    secrets:
      - auth_database_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M

  # Redis - Used for both caching and queue
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction --notify-keyspace-events AKE
    volumes:
      - scoutlgs-redis-data:/data
    networks:
      - redis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 3G

  # API Service
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-cpayne6}/scoutlgs-api:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=api
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_HOST=postgres
      - PORT=5000
      - TRUST_PROXY=1
      - DATABASE_PORT=5432
      - DATABASE_NAME=scoutlgs
      - DATABASE_USER=postgres
      - USE_DOCKER_SECRETS=true
      - FRONTEND_URL=https://scoutlgs.ca
      - LOG_LEVEL=error,fatal
      - AUTH_JWKS_URL=http://auth:5002/auth/internal/.well-known/jwks.json
      - AUTH_JWT_ISSUER=scoutlgs-auth
      - AUTH_JWT_AUDIENCE=scoutlgs-api
      - SCHEDULER_INTERNAL_URL=http://scheduler:5001
    secrets:
      - api_frontend_url
      - api_database_password
    networks:
      - redis-network
      - postgres-network
      - auth-network
      - scheduler-internal-network
      - tunnel-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 2G
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  # Auth Service
  auth:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-cpayne6}/scoutlgs-auth:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - PORT=5002
      - TRUST_PROXY=1
      - DATABASE_HOST=auth-postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=scoutlgs_auth
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD_FILE=/run/secrets/auth_database_password
      - FRONTEND_URL=https://scoutlgs.ca
      - COOKIE_DOMAIN=scoutlgs.ca
      - COOKIE_SECURE=true
      - AUTH_JWT_ISSUER=scoutlgs-auth
      - AUTH_JWT_AUDIENCE=scoutlgs-api
      - AUTH_JWT_KEY_ID=primary-1
      - AUTH_INTERNAL_ALLOWED_HOSTS=auth,localhost,127.0.0.1
      - AUTH_JWT_PRIVATE_KEY_FILE=/run/secrets/auth_jwt_private_key
      - AUTH_TOKEN_HASH_SECRET_FILE=/run/secrets/auth_token_hash_secret
      - AUTH_GOOGLE_CLIENT_ID_FILE=/run/secrets/auth_google_client_id
      - AUTH_GOOGLE_CLIENT_SECRET_FILE=/run/secrets/auth_google_client_secret
      - AUTH_GOOGLE_CALLBACK_URL=https://scoutlgs.ca/auth/google/callback
      - LOG_LEVEL=error,warn,fatal
    secrets:
      - auth_database_password
      - auth_jwt_private_key
      - auth_token_hash_secret
      - auth_google_client_id
      - auth_google_client_secret
    networks:
      - auth-postgres-network
      - auth-network
      - tunnel-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5002/auth/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  # UI Service
  ui:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-cpayne6}/scoutlgs-ui:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=ui
      - USE_DOCKER_SECRETS=true
    secrets:
      - ui_vite_api_url
    networks:
      - tunnel-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  # Scheduler Service
  scheduler:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-cpayne6}/scoutlgs-scheduler:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=scheduler
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=scoutlgs
      - DATABASE_USER=postgres
      - PORT=5001
      - USE_DOCKER_SECRETS=true
      - EXTRACTION_ENABLED=true
      - EXTRACTION_CRON_TIME=0 1 * * *
      # Hourly incremental disabled — updated_at clusters tightly (stores'
      # price-sync jobs touch every product daily), so the `updated_at:>cutoff`
      # filter doesn't actually narrow the result set. The bucket flow's full
      # nightly run handles freshness adequately.
      - INCREMENTAL_EXTRACTION_ENABLED=false
      - INCREMENTAL_EXTRACTION_CRON_TIME=0 9-21 * * *
      - SCHEDULE_TIMEZONE=America/Toronto
      - LOG_LEVEL=log,warn,error,fatal
    ports:
      - "5001:5001"
    secrets:
      - scheduler_database_password
    networks:
      - redis-network
      - postgres-network
      - scheduler-internal-network
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node dist/main.js"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M

  # Scraper Worker Service
  scraper:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-cpayne6}/scoutlgs-scraper:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=scraper
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=scoutlgs
      - DATABASE_USER=postgres
      - WEBSHARE_PORT=80
      - WEBSHARE_HOST=p.webshare.io
      - USE_DOCKER_SECRETS=true
      - LOG_LEVEL=error,fatal
    secrets:
      - scraper_database_password
      - scraper_webshare_username
      - scraper_webshare_password
    networks:
      - redis-network
      - postgres-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 3
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 2G

  # Cloudflare Tunnel - Secure public access via Cloudflare
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN_FILE=/run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    networks:
      - tunnel-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 256M

networks:
  # Redis access: api, scheduler, scraper only
  redis-network:
    driver: overlay
  # Postgres access: api, scraper only
  postgres-network:
    driver: overlay
  # Auth service access: api only
  auth-network:
    driver: overlay
  # Scheduler manual endpoints: api only (proxied via /admin/scheduler/*)
  scheduler-internal-network:
    driver: overlay
  # Auth Postgres access: auth only
  auth-postgres-network:
    driver: overlay
  # Tunnel routing: cloudflared, ui, api
  tunnel-network:
    driver: overlay

volumes:
  scoutlgs-redis-data:
  scoutlgs-postgres-data:
  scoutlgs-auth-postgres-data:

# Docker Secrets Configuration
# Secrets must be created before deployment using scripts/setup-secrets.sh
secrets:
  # Global secrets
  postgres_password:
    external: true
    name: postgres_password
  cloudflare_tunnel_token:
    external: true
    name: cloudflare_tunnel_token

  # API secrets
  api_frontend_url:
    external: true
    name: api_frontend_url
  api_database_password:
    external: true
    name: api_database_password

  # Auth secrets
  auth_database_password:
    external: true
    name: auth_database_password
  auth_jwt_private_key:
    external: true
    name: auth_jwt_private_key
  auth_token_hash_secret:
    external: true
    name: auth_token_hash_secret
  auth_google_client_id:
    external: true
    name: auth_google_client_id
  auth_google_client_secret:
    external: true
    name: auth_google_client_secret

  # UI secrets
  ui_vite_api_url:
    external: true
    name: ui_vite_api_url

  # Scheduler secrets
  scheduler_database_password:
    external: true
    name: scheduler_database_password

  # Scraper secrets
  scraper_database_password:
    external: true
    name: scraper_database_password
  scraper_webshare_username:
    external: true
    name: scraper_webshare_username
  scraper_webshare_password:
    external: true
    name: scraper_webshare_password
